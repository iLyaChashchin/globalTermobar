<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Расчет выделения Co2 при сгорании бензина</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Расчитай сколько Co2 выделится при сгорании бензина!</h1>
      <p>Разберись с проблемой излишнего парникового эффекта!</p>
    </div>
  </header>
  <main>
    {% block content %}
    <h2 class="main__title">Выбери расстояние пути (км):</h2>
    <ul class="list" id="list">
      <!-- Задание №3 -->
      
      <li class="list__item">
        <a href="{{lights + "/1"}}">
          <img class="item__img" src="../static/img/killometr.png" alt="battery">
          <span>100 км</span></a>
      </li>
      <li class="list__item">
        <a href="{{lights + "/5"}}">
          <img class="item__img" src="../static/img/killometr.png" alt="battery">
          <span>500 км</span></a>
      </li>

      <li class="list__item">
        <a href="{{lights + "/10"}}">
          <img class="item__img" src="../static/img/killometr.png" alt="battery">
          <span>1000 км</span></a>
      </li>
      <!--  -->
    </ul>
    {% endblock %}
  </main>
  <footer>

  </footer>
</body>
</html>
